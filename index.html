<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제이에이치창호 - 메인</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 메인 페이지 전체 컨테이너 -->
    <div class="page-container">
        <!-- 메인 배경 이미지 -->
        <img src="images/main.png" alt="메인 페이지" class="bg-image">

        <!-- 상단 내비게이션 클릭 영역 (Hotspots) -->
        <nav class="nav-container">
            <a href="index.html" class="hotspot logo-btn" title="메인으로 이동"></a>
            <a href="product.html" class="hotspot menu-btn product-btn" title="제품소개로 이동"></a>
            <a href="portfolio.html" class="hotspot menu-btn portfolio-btn" title="시공사례로 이동"></a>
            <a href="about.html" class="hotspot menu-btn about-btn" title="회사소개로 이동"></a>
        </nav>
    </div>

    <!-- 메인 화면 위에 떠오르는 플로팅 공지 팝업창 -->
    <div id="mainPopup" class="popup-overlay">
        <div class="popup-window">
            <!-- 팝업 상단 타이틀 바 (참고 이미지 스타일) -->
            <div class="popup-header">
                <span class="popup-title">KCC 정품 인증 마크 안내</span>
                <button type="button" id="btnCloseTop" class="popup-close-x" aria-label="닫기">✕</button>
            </div>

            <!-- 팝업 중앙 이미지 영역 (popup.jpg) -->
            <div class="popup-body">
                <img src="images/popup.jpg" alt="KCC 정품 인증 마크 공지" class="popup-img" onerror="this.src='popup.jpg'">
            </div>

            <!-- 팝업 하단 7일 보지 않기 바 (참고 이미지 스타일) -->
            <div id="btnHide7Days" class="popup-footer">
                <span>7일 동안 열지 않음 ✕</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
