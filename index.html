<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제이에이치창호 - 메인</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-container">
        <!-- 배경 디자인 이미지 -->
        <img src="images/main.png" alt="메인 페이지" class="bg-image">

        <!-- 상단 내비게이션 투명 클릭 영역 -->
        <nav class="nav-container">
            <a href="index.html" class="hotspot logo-btn" title="메인으로 이동"></a>
            <a href="product.html" class="hotspot menu-btn product-btn" title="제품소개로 이동"></a>
            <a href="portfolio.html" class="hotspot menu-btn portfolio-btn" title="시공사례로 이동"></a>
            <a href="about.html" class="hotspot menu-btn about-btn" title="회사소개로 이동"></a>
        </nav>

        <!-- [추가] 팝업창 레이어 (기본 상태는 숨김 처리) -->
        <div id="mainPopup" class="popup-overlay">
            <div class="popup-content">
                <!-- 팝업 이미지 -->
                <img src="images/popup.jpg" alt="KCC 정품 인증 마크 안내 공지" class="popup-img">
                <!-- 하단 버튼 영역 -->
                <div class="popup-footer">
                    <button type="button" id="btnHide7Days" class="popup-btn">7일 동안 보지 않기</button>
                    <button type="button" id="btnClosePopup" class="popup-btn close-btn">창 닫기</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
